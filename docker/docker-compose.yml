version: '3.8'

services:
  # GENESIS main application
  genesis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: genesis-app
    ports:
      - "7860:7860"  # Gradio interface
    volumes:
      # Mount code for development (hot reload)
      - ./core:/app/core
      - ./tools:/app/tools
      - ./utils:/app/utils
      - ./main.py:/app/main.py
      
      # Persistent data
      - ./data:/app/data
      - ./logs:/app/logs
      - ./MISSION.md:/app/MISSION.md
      
      # Prevent overwriting
      - /app/__pycache__
    environment:
      # Application settings
      - GENESIS_ENV=production
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      
      # Vector DB connection
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      
      # Model settings (override via .env)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      
      # Mission config
      - MISSION_FILE=/app/MISSION.md
    env_file:
      - .env  # Load from .env file if exists
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - genesis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Qdrant vector database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: genesis-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant-storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - genesis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  genesis-network:
    driver: bridge

volumes:
  qdrant-storage:
    driver: local
