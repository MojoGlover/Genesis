
# AI Core System Configuration
# Version 0.4.0

system:
  name: "AI Core"
  version: "0.4.0"
  environment: "development"  # development, staging, production
  debug: true

# ============================================================================
# AI MODELS CONFIGURATION
# ============================================================================
models:
  # Local models (Ollama)
  local:
    # Primary intelligence - 70B parameter model
    primary:
      name: "llama3.1:70b"
      provider: "ollama"
      base_url: "http://localhost:11434"
      max_tokens: 4096
      temperature: 0.7
      top_p: 0.9
      
    # Fast responses
    fast:
      name: "genesis-zero:latest"
      provider: "ollama"
      base_url: "http://localhost:11434"
      max_tokens: 2048
      temperature: 0.5
      top_p: 0.95
    
    # Specialized models
    specialist:
      code:
        name: "qwen2.5-coder:32b"
        provider: "ollama"
        base_url: "http://localhost:11434"
        max_tokens: 2048
        temperature: 0.3  # Lower for code
        
      # Add more specialists as needed
      # math:
      #   name: "deepseek-math:7b"
      # vision:
      #   name: "llava:13b"
  
  # Cloud models (fallback/advanced)
  cloud:
    enabled: true


    
    # Anthropic Claude
    claude:
      name: "claude-sonnet-4-20250514"
      provider: "anthropic"
      api_key_env: "ANTHROPIC_API_KEY"
      max_tokens: 4096
      temperature: 0.7
    
    # OpenAI GPT
    openai:
      name: "gpt-4o"
      provider: "openai"
      api_key_env: "OPENAI_API_KEY"
      max_tokens: 4096
      temperature: 0.7
    
    # Google Gemini
    google:
      name: "gemini-2.0-flash-exp"
      provider: "google"
      api_key_env: "GOOGLE_API_KEY"
      max_tokens: 4096
      temperature: 0.7

# ============================================================================
# ROUTING CONFIGURATION
# ============================================================================
routing:
  # Strategy: adaptive, local_first, cloud_first, manual
  strategy: "adaptive"
  
  # Prefer local unless X% confident cloud is better
  local_preference: 0.8  # 80% confidence needed to use cloud
  
  # Timeouts & retries
  timeout_seconds: 30
  retry_attempts: 2
  retry_delay: 1.0  # seconds
  
  # Complexity thresholds
  complexity:
    simple_max_tokens: 15
    medium_max_tokens: 200
    # high is anything above medium

# ============================================================================
# MEMORY & STORAGE CONFIGURATION
# ============================================================================
memory:
  # Relational database (structured data)
  relational:
    type: "sqlite"
    path: "./data/memory.db"
    echo: false  # SQL query logging
    pool_size: 5
    max_overflow: 10
  
  # Vector database (embeddings)
  vector:
    type: "qdrant"
    url: "http://localhost:6333"
    grpc_url: "localhost:6334"
    timeout: 10.0
    
    # Collection names
    collections:
      memories: "ai_core_memories"
      patterns: "ai_core_patterns"
      knowledge: "ai_core_knowledge"
    
    # Vector configuration
    vector_size: 768  # for all-mpnet-base-v2
    distance: "Cosine"  # Cosine, Dot, Euclidean
  
  # Embeddings configuration
  embeddings:
    # Model for generating embeddings
    model: "sentence-transformers/all-mpnet-base-v2"
    # Alternative: "sentence-transformers/all-MiniLM-L6-v2" (faster, smaller)
    
    # Device: cpu, cuda, mps (Metal Performance Shaders for M1)
    device: "mps"
    
    # Batch processing
    batch_size: 32
    normalize_embeddings: true
    
    # Caching
    cache_folder: "./data/cache/embeddings"

# ============================================================================
# STORAGE DIRECTORIES
# ============================================================================
storage:
  # User uploads
  uploads_dir: "./data/uploads"
  max_upload_size_mb: 100
  allowed_extensions:
    - "txt"
    - "md"
    - "pdf"
    - "png"
    - "jpg"
    - "jpeg"
  
  # Cache directory
  cache_dir: "./data/cache"
  
  # Logs directory
  logs_dir: "./logs"
  log_retention_days: 30

# ============================================================================
# LEARNING & INTELLIGENCE
# ============================================================================
learning:
  # Enable learning from interactions
  enabled: true
  
  # Feedback weight (how much to trust user corrections)
  feedback_weight: 0.3
  
  # Pattern detection
  pattern_confidence_threshold: 0.7
  min_pattern_occurrences: 3
  
  # Auto-improvement
  auto_improve: true
  auto_improve_threshold: 0.8
  
  # Context window for RAG
  rag:
    max_context_messages: 10
    max_retrieved_memories: 5
    relevance_threshold: 0.7
    
  # Conversation summarization
  summarization:
    enabled: true
    trigger_message_count: 20
    summary_model: "fast"  # primary, fast, or cloud

# ============================================================================
# TOOLS & CAPABILITIES
# ============================================================================
tools:
  # Which tools are enabled
  enabled:
    - web_search
    - file_operations
    - code_execution
  
  # Web search configuration
  web_search:
    provider: "duckduckgo"  # duckduckgo, brave, google
    max_results: 5
    timeout: 10
    
  # File operations
  file_operations:
    allowed_dirs:
      - "./data/uploads"
      - "./data/cache"
    max_file_size_mb: 50
    
  # Code execution (sandboxed)
  code_execution:
    enabled: false  # Disabled by default for security
    sandbox: true
    timeout: 10
    allowed_languages:
      - python
      - javascript
      - bash
    max_output_lines: 100

# ============================================================================
# API SERVER CONFIGURATION
# ============================================================================
api:
  # Server settings
  host: "0.0.0.0"
  port: 8000
  reload: true  # Auto-reload on code changes (dev only)
  workers: 1    # Number of worker processes (increase for production)
  
  # CORS settings
  cors_enabled: true
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
  cors_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
  cors_headers:
    - "*"
  
  # Rate limiting (requests per minute)
  rate_limit:
    enabled: false
    requests_per_minute: 60
    
  # Request size limits
  max_request_size_mb: 10

# ============================================================================
# MONITORING & OBSERVABILITY
# ============================================================================
monitoring:
  # Enable monitoring
  enabled: true
  
  # LangSmith (optional)
  langsmith:
    enabled: false
    api_key_env: "LANGSMITH_API_KEY"
    project: "ai-core"
    endpoint: "https://api.smith.langchain.com"
  
  # Logging configuration
  logging:
    level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
    format: "json"  # json or text
    
    # Log file settings
    file:
      enabled: true
      path: "./logs/ai-core.log"
      rotation: "1 day"
      retention: "30 days"
      
    # Console output
    console:
      enabled: true
      colorize: true
  
  # Metrics (Prometheus format)
  metrics:
    enabled: false
    port: 9090
    path: "/metrics"

# ============================================================================
# SECURITY
# ============================================================================
security:
  # API authentication
  auth:
    enabled: false  # Enable for production
    type: "bearer"  # bearer, api_key
    
  # Data encryption
  encryption:
    enabled: false
    algorithm: "AES-256-GCM"
    key_env: "ENCRYPTION_KEY"
  
  # Secrets management
  secrets:
    # Load from environment variables
    use_env: true
    
    # Or from external service (future)
    # vault_url: "https://vault.example.com"

# ============================================================================
# DEVELOPMENT SETTINGS
# ============================================================================
development:
  # Auto-reload on code changes
  hot_reload: true
  
  # Detailed error messages
  debug_mode: true
  
  # Test mode (uses mock providers)
  test_mode: false
  
  # Profiling
  profiling:
    enabled: false
    output_dir: "./logs/profiles"

# ============================================================================
# PRODUCTION OVERRIDES (loaded when environment=production)
# ============================================================================
# These settings override the above when ENVIRONMENT=production
production:
  system:
    debug: false
  
  api:
    reload: false
    workers: 4
    
  monitoring:
    logging:
      level: "WARNING"
      
  security:
    auth:
      enabled: true
      
  development:
    hot_reload: false
    debug_mode: false
