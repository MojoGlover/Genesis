version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-core-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage:z
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped
    networks:
      - genesis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  workspace:
    build:
      context: .
      dockerfile: Dockerfile.workspace
    container_name: genesis-workspace
    volumes:
      - workspace-data:/workspace
      - workspace-cache:/root/.cache
    environment:
      - WORKSPACE_ID=genesis-main
    networks:
      - genesis-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    tty: true
    stdin_open: true

networks:
  genesis-network:
    driver: bridge

volumes:
  qdrant-storage:
    driver: local
  workspace-data:
    driver: local
  workspace-cache:
    driver: local
