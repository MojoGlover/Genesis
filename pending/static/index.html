<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>GENESIS</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
</head>
<body>

<div class="app" x-data="genesis()" x-init="init()">

  <!-- Toast -->
  <div class="toast" :class="{ show: toastMsg }" x-text="toastMsg"></div>

  <!-- Header -->
  <header class="header">
    <h1>GENESIS</h1>
    <div class="status-dot" :class="{ busy: status === 'executing' || status === 'awaiting_confirmation' }"></div>
  </header>

  <!-- Swipe Panels -->
  <div class="panels" x-ref="panels">

    <!-- Panel 0: Chat -->
    <section class="panel">
      <div class="messages" x-ref="messages">
        <template x-if="history.length === 0">
          <div class="empty-state">Describe what you want to build.</div>
        </template>
        <template x-for="(msg, i) in history" :key="i">
          <div class="msg" :class="msg.role" x-text="msg.content"></div>
        </template>
        <template x-if="isLoading">
          <div class="msg assistant"><span class="spinner"></span></div>
        </template>
      </div>

      <div class="input-bar">
        <textarea
          x-model="message"
          rows="1"
          placeholder="Describe what you want..."
          @keydown.enter.prevent="send()"
          @input="$el.style.height='auto'; $el.style.height=Math.min($el.scrollHeight,120)+'px'"
        ></textarea>
        <button class="btn btn-icon" :class="{ recording: isRecording }" @click="toggleRecording()">
          <span class="dot-icon" x-text="isRecording ? '\u23f9' : '\ud83c\udfa4'"></span>
        </button>
        <button class="btn btn-primary" @click="send()" :disabled="isLoading || !message.trim()">
          <span x-show="!isLoading">Send</span>
          <span x-show="isLoading" class="spinner"></span>
        </button>
      </div>

      <!-- Hidden TTS player -->
      <audio x-ref="ttsPlayer" :src="voiceAudio" style="display:none"></audio>
    </section>

    <!-- Panel 1: Tasks -->
    <section class="panel">
      <div class="task-list">
        <template x-if="tasks.length === 0">
          <div class="empty-state">No tasks queued yet.<br>Chat with GENESIS to create tasks.</div>
        </template>
        <template x-for="task in tasks" :key="task.id">
          <div class="task-card" :class="{ selected: selectedTaskId === task.id }" @click="selectTask(task)">
            <div class="task-name" x-text="statusIcon(task.status) + ' ' + task.name"></div>
            <div class="task-desc" x-text="task.description"></div>
            <div class="task-status" :class="task.status" x-text="task.status"></div>
          </div>
        </template>
      </div>

      <template x-if="selectedTaskDetails">
        <div class="exec-log" x-text="selectedTaskDetails"></div>
      </template>

      <div class="task-actions">
        <button class="btn btn-primary btn-full" @click="executeTask()" :disabled="isExecuting || tasks.length === 0">
          <span x-show="!isExecuting">Execute Task</span>
          <span x-show="isExecuting"><span class="spinner"></span> Building...</span>
        </button>
      </div>

      <template x-if="executionLog">
        <div class="exec-log" x-text="executionLog"></div>
      </template>
    </section>

    <!-- Panel 2: Code -->
    <section class="panel">
      <div class="code-viewer">
        <pre><code x-text="code"></code></pre>
      </div>
      <div class="code-path">
        <input type="text" x-model="savePath" placeholder="Save path...">
      </div>
      <div class="code-actions">
        <button class="btn btn-primary" @click="refreshCode()" style="flex:1">Refresh Code</button>
      </div>
    </section>

    <!-- Panel 3: Settings -->
    <section class="panel">
      <div class="settings">
        <div class="setting-card">
          <h3>GPS Location</h3>
          <p x-text="locationStatus"></p>
          <button class="btn btn-primary btn-full" @click="shareLocation()">Share My Location</button>
        </div>

        <div class="setting-card">
          <h3>Connection</h3>
          <p class="info" x-text="window.location.origin"></p>
        </div>

        <div class="setting-card">
          <h3>Reset</h3>
          <p>Clear all conversation history and queued tasks.</p>
          <button class="btn btn-danger btn-full" @click="resetAll()">Reset Everything</button>
        </div>
      </div>
    </section>

  </div>

  <!-- Bottom nav dots -->
  <nav class="nav-dots">
    <button class="nav-dot" :class="{ active: tab === 0 }" @click="goTo(0)">
      <span class="dot-icon">&equiv;</span>
      <span>Chat</span>
    </button>
    <button class="nav-dot" :class="{ active: tab === 1 }" @click="goTo(1)">
      <span class="dot-icon">&#9776;</span>
      <span>Tasks</span>
    </button>
    <button class="nav-dot" :class="{ active: tab === 2 }" @click="goTo(2)">
      <span class="dot-icon">&lt;/&gt;</span>
      <span>Code</span>
    </button>
    <button class="nav-dot" :class="{ active: tab === 3 }" @click="goTo(3)">
      <span class="dot-icon">&#9881;</span>
      <span>Settings</span>
    </button>
  </nav>

</div>

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
<script src="/static/app.js"></script>

<script>
  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js').catch(() => {});
  }
</script>

</body>
</html>
