<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GENESIS Monitor</title>
    <style>
        :root {
            --bg: #0a0a14; --bg-card: #12121e; --bg-hover: #1a1a2e;
            --text: #e0e0f0; --text-muted: #6a6a8a;
            --accent: #5b7cf7; --accent-dim: rgba(91,124,247,0.15);
            --green: #34d399; --green-dim: rgba(52,211,153,0.15);
            --yellow: #fbbf24; --yellow-dim: rgba(251,191,36,0.15);
            --red: #f87171; --red-dim: rgba(248,113,113,0.15);
            --border: #1e1e35; --radius: 10px;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;line-height:1.5}
        .header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--bg-card)}
        .header-left{display:flex;align-items:center;gap:12px}
        .logo{font-size:16px;font-weight:700;letter-spacing:2px}
        .ws-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted)}
        .ws-dot{width:8px;height:8px;border-radius:50%;background:var(--red);transition:background 0.3s}
        .ws-dot.connected{background:var(--green)}
        .ws-dot.connecting{background:var(--yellow);animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
        .summary{display:flex;gap:2px;padding:12px 24px;background:var(--bg-card);border-bottom:1px solid var(--border);overflow-x:auto}
        .summary-item{flex:1;min-width:120px;padding:10px 16px;border-radius:var(--radius);background:var(--bg)}
        .summary-value{font-size:24px;font-weight:700}
        .summary-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
        .main{display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:2px;min-height:calc(100vh - 140px)}
        @media(max-width:900px){.main{grid-template-columns:1fr}}
        .card{background:var(--bg-card);padding:16px 20px;display:flex;flex-direction:column}
        .card-title{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
        .card-title .count{background:var(--accent-dim);color:var(--accent);padding:2px 8px;border-radius:10px;font-size:10px}
        .card-body{flex:1;overflow-y:auto;max-height:400px}
        .agent-row{display:flex;align-items:center;gap:12px;padding:8px 10px;border-radius:6px;transition:background 0.15s}
        .agent-row:hover{background:var(--bg-hover)}
        .agent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .agent-dot.healthy{background:var(--green);box-shadow:0 0 6px var(--green)}
        .agent-dot.degraded{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
        .agent-dot.critical,.agent-dot.failing{background:var(--red);box-shadow:0 0 6px var(--red)}
        .agent-dot.unknown{background:var(--text-muted)}
        .agent-name{font-weight:600;flex:1}
        .agent-meta{font-size:11px;color:var(--text-muted);text-align:right}
        .error-row{padding:8px 10px;border-left:2px solid var(--red);margin-bottom:6px;border-radius:0 6px 6px 0;background:var(--red-dim)}
        .error-row.warning{border-left-color:var(--yellow);background:var(--yellow-dim)}
        .error-header{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px}
        .error-agent{font-weight:600;color:var(--red)}
        .error-row.warning .error-agent{color:var(--yellow)}
        .error-time{color:var(--text-muted)}
        .error-msg{font-size:12px;word-break:break-word}
        .circuit-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px}
        .circuit-state{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;text-transform:uppercase}
        .circuit-state.closed{background:var(--green-dim);color:var(--green)}
        .circuit-state.open{background:var(--red-dim);color:var(--red)}
        .circuit-state.half_open{background:var(--yellow-dim);color:var(--yellow)}
        .circuit-name{font-weight:600;flex:1}
        .circuit-stats{font-size:11px;color:var(--text-muted)}
        .resource-row{margin-bottom:10px}
        .resource-header{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
        .resource-label{color:var(--text-muted)}
        .resource-value{font-weight:600}
        .resource-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
        .resource-fill{height:100%;border-radius:3px;transition:width 0.5s ease,background 0.3s}
        .alert-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;font-size:12px}
        .alert-icon{font-size:14px;flex-shrink:0}
        .alert-text{flex:1}
        .alert-time{font-size:10px;color:var(--text-muted);flex-shrink:0}
        .empty{color:var(--text-muted);font-style:italic;padding:20px;text-align:center}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo">GENESIS</div>
            <div class="ws-status"><div class="ws-dot" id="ws-dot"></div><span id="ws-label">disconnected</span></div>
        </div>
        <div style="font-size:11px;color:var(--text-muted)" id="uptime"></div>
    </div>
    <div class="summary">
        <div class="summary-item"><div class="summary-value" id="s-total">-</div><div class="summary-label">Agents</div></div>
        <div class="summary-item"><div class="summary-value" style="color:var(--green)" id="s-healthy">-</div><div class="summary-label">Healthy</div></div>
        <div class="summary-item"><div class="summary-value" style="color:var(--yellow)" id="s-degraded">-</div><div class="summary-label">Degraded</div></div>
        <div class="summary-item"><div class="summary-value" style="color:var(--red)" id="s-critical">-</div><div class="summary-label">Critical</div></div>
        <div class="summary-item"><div class="summary-value" style="color:var(--accent)" id="s-cpu">-</div><div class="summary-label">CPU %</div></div>
        <div class="summary-item"><div class="summary-value" style="color:var(--accent)" id="s-mem">-</div><div class="summary-label">Mem %</div></div>
    </div>
    <div class="main">
        <div class="card">
            <div class="card-title">Agents <span class="count" id="agent-count">0</span></div>
            <div class="card-body" id="agents-list"><div class="empty">Waiting for data...</div></div>
        </div>
        <div class="card">
            <div class="card-title">Recent Errors <span class="count" id="error-count">0</span></div>
            <div class="card-body" id="errors-list"><div class="empty">No errors</div></div>
        </div>
        <div class="card">
            <div class="card-title">Circuit Breakers <span class="count" id="circuit-count">0</span></div>
            <div class="card-body" id="circuits-list"><div class="empty">No circuits registered</div></div>
            <div style="margin-top:16px"><div class="card-title">System Resources</div><div id="resources"><div class="empty">Loading...</div></div></div>
        </div>
        <div class="card">
            <div class="card-title">Alerts <span class="count" id="alert-count">0</span></div>
            <div class="card-body" id="alerts-list" style="max-height:180px"><div class="empty">No alerts</div></div>
            <div style="margin-top:16px"><div class="card-title">Message Bus <span class="count" id="msg-count">0</span></div><div id="messages-info"><div class="empty">Loading...</div></div></div>
        </div>
    </div>
<script>
var ws=null,reconnectTimer=null,startTime=Date.now();
function connectWS(){
    var proto=location.protocol==='https:'?'wss:':'ws:';
    setWSStatus('connecting');
    ws=new WebSocket(proto+'//'+location.host+'/ws/monitor');
    ws.onopen=function(){
        setWSStatus('connected');
        ws.send(JSON.stringify({type:'subscribe',topics:['health','errors','alerts','messages','circuits','metrics']}));
        ['health','errors','alerts','messages','circuits'].forEach(function(t){ws.send(JSON.stringify({type:'request',update_type:t}));});
        fetchResources();
    };
    ws.onmessage=function(e){try{handleUpdate(JSON.parse(e.data));}catch(err){console.error(err);}};
    ws.onclose=function(){setWSStatus('disconnected');scheduleReconnect();};
    ws.onerror=function(){ws.close();};
}
function scheduleReconnect(){if(reconnectTimer)return;reconnectTimer=setTimeout(function(){reconnectTimer=null;connectWS();},3000);}
function setWSStatus(s){document.getElementById('ws-dot').className='ws-dot '+s;document.getElementById('ws-label').textContent=s;}
function handleUpdate(msg){
    var d=msg.data||msg;
    if(msg.type==='health')renderHealth(d);
    else if(msg.type==='errors')renderErrors(d);
    else if(msg.type==='alerts')renderAlerts(d);
    else if(msg.type==='messages')renderMessages(d);
    else if(msg.type==='circuits')renderCircuits(d);
}
function renderHealth(data){
    var s=data.summary||{};
    document.getElementById('s-total').textContent=s.total!=null?s.total:'-';
    document.getElementById('s-healthy').textContent=s.healthy!=null?s.healthy:'-';
    document.getElementById('s-degraded').textContent=s.degraded!=null?s.degraded:'-';
    document.getElementById('s-critical').textContent=s.critical!=null?s.critical:'-';
    var agents=data.agents?Object.values(data.agents):[];
    document.getElementById('agent-count').textContent=agents.length;
    if(!agents.length){document.getElementById('agents-list').innerHTML='<div class="empty">No agents registered</div>';return;}
    var order={critical:0,failing:1,degraded:2,healthy:3};
    agents.sort(function(a,b){return(order[a.status]||4)-(order[b.status]||4);});
    document.getElementById('agents-list').innerHTML=agents.map(function(a){
        var up=a.uptime_seconds?fmtDur(a.uptime_seconds):'-';
        var er=a.error_rate!=null?(a.error_rate*100).toFixed(0)+'%':' ';
        return '<div class="agent-row"><div class="agent-dot '+esc(a.status)+'"></div><div class="agent-name">'+esc(a.name)+'</div><div class="agent-meta">'+(a.error_count||0)+'E/'+(a.success_count||0)+'S '+up+'</div></div>';
    }).join('');
}
function renderErrors(data){
    var errors=data.errors||[];
    document.getElementById('error-count').textContent=errors.length;
    if(!errors.length){document.getElementById('errors-list').innerHTML='<div class="empty">No errors</div>';return;}
    document.getElementById('errors-list').innerHTML=errors.slice(0,20).map(function(e){
        var c=e.severity==='warning'?'warning':'';
        return '<div class="error-row '+c+'"><div class="error-header"><span class="error-agent">'+esc(e.agent)+' - '+esc(e.severity)+'</span><span class="error-time">'+timeAgo(e.timestamp)+'</span></div><div class="error-msg">'+esc(e.message)+'</div></div>';
    }).join('');
}
function renderAlerts(data){
    var alerts=data.alerts||[];
    document.getElementById('alert-count').textContent=alerts.length;
    if(!alerts.length){document.getElementById('alerts-list').innerHTML='<div class="empty">No alerts</div>';return;}
    document.getElementById('alerts-list').innerHTML=alerts.slice(0,10).map(function(a){
        var sev=a.severity||'normal';
        var icon=sev==='critical'?'*':'~';
        return '<div class="alert-row"><span class="alert-icon">'+icon+'</span><span class="alert-text">'+esc(a.agent)+': '+esc(a.message)+'</span><span class="alert-time">'+timeAgo(a.timestamp)+'</span></div>';
    }).join('');
}
function renderMessages(data){
    var s=data.stats||{};
    document.getElementById('msg-count').textContent=s.messages_sent!=null?s.messages_sent:'-';
    document.getElementById('messages-info').innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px"><div>Sent: <strong>'+(s.messages_sent||0)+'</strong></div><div>Delivered: <strong>'+(s.messages_delivered||0)+'</strong></div><div>Queue: <strong>'+(s.queue_size||0)+'</strong></div><div>Subs: <strong>'+(s.agent_subscriptions?s.agent_subscriptions.length:0)+'</strong></div></div>';
}
function renderCircuits(data){
    var entries=[];for(var n in data){if(data.hasOwnProperty(n))entries.push([n,data[n]]);}
    document.getElementById('circuit-count').textContent=entries.length;
    if(!entries.length){document.getElementById('circuits-list').innerHTML='<div class="empty">No circuits registered</div>';return;}
    document.getElementById('circuits-list').innerHTML=entries.map(function(p){
        var n=p[0],c=p[1],st=c.state||'closed',ss=c.stats||{};
        var rate=ss.success_rate!=null?(ss.success_rate*100).toFixed(0)+'%':'-';
        return '<div class="circuit-row"><span class="circuit-state '+st+'">'+st.replace('_',' ')+'</span><span class="circuit-name">'+esc(n)+'</span><span class="circuit-stats">'+rate+' ok | '+(ss.total_calls||0)+' calls</span></div>';
    }).join('');
}
function renderResources(data){
    if(!data||!data.available){document.getElementById('resources').innerHTML='<div class="empty">psutil unavailable</div>';return;}
    var cpu=data.cpu||{},mem=data.memory||{},disk=data.disk||{},proc=data.process||{};
    document.getElementById('s-cpu').textContent=cpu.percent!=null?cpu.percent.toFixed(0):'-';
    document.getElementById('s-mem').textContent=mem.percent!=null?mem.percent.toFixed(0):'-';
    function bar(label,value,detail){
        var pct=Math.min(100,Math.max(0,value||0));
        var color=pct>90?'var(--red)':pct>70?'var(--yellow)':'var(--accent)';
        return '<div class="resource-row"><div class="resource-header"><span class="resource-label">'+label+'</span><span class="resource-value">'+detail+'</span></div><div class="resource-bar"><div class="resource-fill" style="width:'+pct+'%;background:'+color+'"></div></div></div>';
    }
    document.getElementById('resources').innerHTML=
        bar('CPU',cpu.percent,(cpu.percent||0).toFixed(1)+'% ('+(cpu.count||'-')+' cores)')+
        bar('Memory',mem.percent,(mem.used_gb||'-')+' / '+(mem.total_gb||'-')+' GB')+
        bar('Disk',disk.percent,(disk.used_gb||'-')+' / '+(disk.total_gb||'-')+' GB')+
        '<div style="font-size:11px;color:var(--text-muted);margin-top:4px">PID '+(proc.pid||'-')+' | '+(proc.memory_mb||'-')+' MB | '+(proc.threads||'-')+' threads</div>';
}
function fetchResources(){fetch('/dashboard/system/resources').then(function(r){return r.json();}).then(renderResources).catch(function(){document.getElementById('resources').innerHTML='<div class="empty">Error</div>';});}
function esc(s){if(!s)return '';var d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}
function timeAgo(ts){if(!ts)return '';var d=(Date.now()-new Date(ts).getTime())/1000;if(d<60)return Math.floor(d)+'s ago';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';}
function fmtDur(s){if(s<60)return Math.floor(s)+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m';return Math.floor(s/86400)+'d';}
function updateUptime(){document.getElementById('uptime').textContent='session: '+fmtDur((Date.now()-startTime)/1000);}
setInterval(fetchResources,15000);
setInterval(updateUptime,1000);
updateUptime();
setInterval(function(){if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:'ping'}));},30000);
connectWS();
</script>
</body>
</html>
